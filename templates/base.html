<!DOCTYPE html>
<html>
<head>
<title>AI Restaurant Recommender</title>

<style>

/* --- Global Styles --- */
body{
font-family: Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

/* --- Header --- */
header{
background:#ff4d4d;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* --- Navigation --- */
.nav{
display:flex;
gap:15px;
align-items:center;
}

.nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.nav a:hover{
text-decoration:underline;
}

/* --- Search Bar --- */
.search-form{
display:flex;
gap:10px;
margin-left:20px;
}

.search-form input{
padding:7px;
border-radius:5px;
border:none;
}

.search-form button{
padding:7px 12px;
border:none;
border-radius:5px;
background:#007bff;
color:white;
cursor:pointer;
}

.search-form button:hover{
background:#0069d9;
}

/* --- Container --- */
.container{
width:90%;
margin:20px auto;
}

/* --- Cards --- */
.restaurant-container,
.dish-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.restaurant-card,
.food-card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
align-items:center;
}

.restaurant-card img,
.food-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

/* --- Buttons --- */
button{
background:#ff4d4d;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e60000;
}

</style>
</head>

<body>

<header>

<h2>🍽 AI Restaurant App</h2>

<div class="nav">

<a href="/">Home</a>

{% if user.is_authenticated %}

<a href="{% url 'orders' %}">Orders</a>

<a href="{% url 'cart' %}">
Cart 🛒 ({{ request.user.cart_set.count }})
</a>

<span>👋 {{ user.username }}</span>

<form action="{% url 'custom_logout' %}" method="post">
{% csrf_token %}
<button type="submit">Logout</button>
</form>

{% else %}

<a href="{% url 'login' %}">Login</a>

{% endif %}

</div>

</header>

<!-- Search bar -->
<div style="background:white;padding:15px;">

{% if request.path == "/" %}
<form action="{% url 'home' %}" method="GET" class="search-form">
<input type="text" name="q" placeholder="Search food or restaurant">
<button type="submit">Search 🔍</button>
</form>
{% endif %}

</form>

</div>



<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
