<!DOCTYPE html>
<html>
<head>
<title>UPI Payment</title>
</head>

<body>

<h2>Complete Payment</h2>

<p>Total Amount: ₹{{ total }}</p>

<br>

<a href="{{ upi_link }}">
<button style="padding:15px 25px;font-size:18px;background:green;color:white;border:none;">
Pay Using UPI
</button>
</a>

<br><br>

<p>After completing payment click confirm.</p>

<form method="POST" action="{% url 'confirm_payment' %}">
{% csrf_token %}
<button style="padding:10px 20px;font-size:16px;background:blue;color:white;">
Confirm Payment
</button>
</form>

</body>
</html>
